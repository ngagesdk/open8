name: Haiku OS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Build on Haiku VM
        uses: vmactions/haiku-vm@v1
        with:
          usesh: true

          prepare: |
            pkgman refresh

            pkgman install -y git
            pkgman install -y cmake
            pkgman install -y ninja
            pkgman install -y pkgconfig
            pkgman install -y sdl3_devel

          run: |
            set -e

            git clone "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY" .
            mkdir -p build

            cmake -S . -B build -G Ninja
            cmake --build build
