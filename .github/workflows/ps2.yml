name: PS2

on: [push, pull_request]

env:
  BUILD_TYPE: Release

jobs:
  ps2:
    name: Build (PS2)
    runs-on: ubuntu-latest
    container: ps2dev/ps2dev:latest

    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          apk update
          apk add cmake make git bash curl

      - name: Configure project
        run: |
          cmake -S . \
                -B build \
                -DCMAKE_TOOLCHAIN_FILE=/usr/local/ps2dev/ps2sdk/ps2dev.cmake \
                -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build project
        run: cmake --build build --config ${{ env.BUILD_TYPE }}

      - name: Prepare output
        run: |
          mkdir -p output

          # Typical PS2 ELF output
          find build -name "*.elf" -exec cp {} output/BOOT.ELF \;

          # Optional: ISO or artifact folder (if your build produces it)
          if [ -d iso ]; then
            cp -r iso output/
          fi

          # Optional: additional assets
          if [ -d export ]; then
            cp -r export/* output/
          fi

      - name: Archive PS2 build
        uses: actions/upload-artifact@v7
        with:
          name: open8-PS2
          path: |
            export/carts
            export/open8.elf
          if-no-files-found: error