name: SEGA Dreamcast

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kazade/dreamcast-sdk:latest

    env:
      BUILD_TYPE: Release
      KOS_BASE: /opt/toolchains/dc/kos

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
    
      - name: Configure project
        shell: bash
        run: |
          source "$KOS_BASE/environ.sh"
    
          kos-cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
            -DSDL_OPENGL=OFF
    
      - name: Build project
        shell: bash
        run: |
          source "$KOS_BASE/environ.sh"
    
          cmake --build build -- -j"$(nproc)"
    
      - name: Prepare output
        shell: bash
        run: |
          mkdir -p export
    
          find build -type f \
            \( -name "*.elf" -o -name "*.bin" -o -name "*.srec" \) \
            -exec cp {} export/ \;
    
      - name: Upload Dreamcast build
        uses: actions/upload-artifact@v7
        with:
          name: dreamcast-build
          path: export/
