name: SEGA Dreamcast

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kazade/dreamcast-sdk:latest

    env:
      BUILD_TYPE: Release
      KOS_BASE: /opt/toolchains/dc/kos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
    
      - name: Configure project
        shell: bash
        run: |
          source "$KOS_BASE/environ.sh"
    
          kos-cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${BUILD_TYPE}
    
      - name: Build and install GLdc
        shell: bash
        run: |
          source "$KOS_BASE/environ.sh"

          git clone --depth 1 https://github.com/Kazade/GLdc.git /tmp/GLdc

          cmake -S /tmp/GLdc \
                -B /tmp/GLdc/build \
                -DCMAKE_TOOLCHAIN_FILE=/tmp/GLdc/toolchains/Dreamcast.cmake \
                -DCMAKE_BUILD_TYPE=Release \
                -DBUILD_SAMPLES=OFF \
                -DBUILD_TESTS=OFF

          cmake --build /tmp/GLdc/build -- -j"$(nproc)"

          # Install headers and libraries into KOS
          cp -r /tmp/GLdc/include/GL \
                "$KOS_BASE/addons/include/"

          find /tmp/GLdc/build -name "libGL*.a" \
                -exec cp {} "$KOS_BASE/addons/lib/dreamcast/" \;
      
      - name: Build project
        shell: bash
        run: |
          source "$KOS_BASE/environ.sh"
    
          cmake --build build -- -j"$(nproc)"
    
      - name: Prepare output
        shell: bash
        run: |
          mkdir -p export
    
          find build -type f \
            \( -name "*.elf" -o -name "*.bin" -o -name "*.srec" \) \
            -exec cp {} export/ \;
    
      - name: Upload Dreamcast build
        uses: actions/upload-artifact@v7
        with:
          name: open8-DREAMCAST.zip
          path: |
            export/carts/*.PNG
            export/open8.elf
