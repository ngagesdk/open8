name: SEGA Dreamcast

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: kazade/dreamcast-sdk:latest

    env:
      BUILD_TYPE: Release
      KOS_BASE: /opt/toolchains/dc/kos

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
    
      - name: Verify KOS installation
        shell: bash
        run: |
          echo "KOS_BASE=$KOS_BASE"
    
          test -f "$KOS_BASE/environ.sh"
    
          source "$KOS_BASE/environ.sh"
    
          echo "PATH=$PATH"
    
          which sh-elf-gcc
          which kos-cc
    
          sh-elf-gcc -dumpmachine
    
      - name: Clone SDL3
        run: |
          git clone --depth 1 --branch dreamcastSDL3 https://github.com/GPF/SDL.git SDL
    
      - name: Build SDL
        shell: bash
        run: |
          source "$KOS_BASE/environ.sh"
    
          mkdir -p SDL/build
          cd SDL/build
    
          cmake .. \
            -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
            -DCMAKE_C_COMPILER=kos-cc
    
          make -j"$(nproc)"
    
      - name: Configure project
        shell: bash
        run: |
          source "$KOS_BASE/environ.sh"
    
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=${BUILD_TYPE} \
            -DCMAKE_C_COMPILER=kos-cc
    
      - name: Build project
        shell: bash
        run: |
          source "$KOS_BASE/environ.sh"
    
          cmake --build build -- -j"$(nproc)"
    
      - name: Prepare output
        shell: bash
        run: |
          mkdir -p export
    
          find build -type f \
            \( -name "*.elf" -o -name "*.bin" -o -name "*.srec" \) \
            -exec cp {} export/ \;
    
      - name: Upload Dreamcast build
        uses: actions/upload-artifact@v4
        with:
          name: dreamcast-build
          path: export/
