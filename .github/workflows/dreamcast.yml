name: SEGA Dreamcast

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: kazade/dreamcast-sdk:latest

    env:
      BUILD_TYPE: Release
      KOS_BASE: /opt/toolchains/dc/kos

    steps:
      # IMPORTANT: Use v3 checkout for older GLIBC compatibility.
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Debug toolchain
        run: |
          echo "KOS_BASE=$KOS_BASE"
          echo "PATH=$PATH"
          which sh-elf-gcc || true
          which kos-cc || true
          sh-elf-gcc --version || true

      - name: Inspect KOS installation
        run: |
          ls -la /opt/toolchains
          ls -la /opt/toolchains/dc || true
          ls -la /opt/toolchains/dc/kos || true
          find /opt/toolchains -name sh-elf-gcc 2>/dev/null || true
          find /opt/toolchains -name kos-cc 2>/dev/null || true

      - name: Verify KOS toolchain
        run: |
          echo "KOS_BASE=$KOS_BASE"
          sh-elf-gcc --version || true
          kos-cc --version || true

      - name: Clone SDL (Dreamcast SDL3 fork)
        run: |
          git clone --branch dreamcastSDL3 https://github.com/GPF/SDL.git SDL

      - name: Build SDL
        run: |
          cd SDL
          mkdir build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Configure project
        run: |
          mkdir -p build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build project
        run: |
          cmake --build build -j$(nproc)

      - name: Prepare output
        run: |
          mkdir -p export
          find build -type f \( -name "*.elf" -o -name "*.bin" \) -exec cp {} export/ \;

      - name: Upload Dreamcast build
        uses: actions/upload-artifact@v4
        with:
          name: dreamcast-build
          path: export/**