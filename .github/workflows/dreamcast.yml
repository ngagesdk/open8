name: Dreamcast

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: nold360/kallistios-sdk:latest

    env:
      BUILD_TYPE: Release
      KOS_BASE: /opt/toolchains/dc/kos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check KallistiOS environment
        run: |
          echo "KOS_BASE=$KOS_BASE"
          sh-elf-gcc --version || true

      - name: Clone SDL (Dreamcast SDL3 fork)
        run: |
          git clone --branch dreamcastSDL3 https://github.com/GPF/SDL.git SDL

      - name: Build SDL
        run: |
          cd SDL
          mkdir build && cd build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Configure project
        run: |
          mkdir -p build
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build project
        run: |
          cmake --build build --config Release --verbose -j$(nproc)

      - name: Prepare output
        run: |
          mkdir -p export
          find build -type f \( -name "*.elf" -o -name "*.bin" -o -name "*.iso" \) -exec cp {} export/ \;

      - name: Upload Dreamcast build
        uses: actions/upload-artifact@v4
        with:
          name: dreamcast-build
          path: |
            export/**
